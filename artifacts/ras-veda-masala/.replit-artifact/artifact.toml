kind = "web"
previewPath = "/"
title = "Ras Veda Masala"
version = "1.0.0"
id = "artifacts/ras-veda-masala"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23740

[services.development]
run = "pnpm --filter @workspace/ras-veda-masala run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ras-veda-masala", "run", "build" ]
publicDir = "artifacts/ras-veda-masala/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23740"
BASE_PATH = "/"
